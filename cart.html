<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | FruitStitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container nav-wrapper">
        <a href="index.html" class="brand">
            <img src="images/fruitstitch-logo.png" alt="FruitStitch Logo" class="site-logo">
            <span class="brand-text">FRUITSTITCH</span>
        </a>

        <div class="nav-actions">
            <a href="shop.html" class="btn">Continue Shopping</a>
            <a href="checkout.html" class="btn btn-accent">Checkout</a>
        </div>
    </div>
</header>

<h1 class="title">Your Cart</h1>

<div id="cart"></div>
<h2 id="total"></h2>

<div class="container" style="display:flex; gap:1rem; justify-content:flex-end; margin-top:2rem;">
    <button class="btn btn-soft" onclick="clearCart()">Clear Cart</button>
    <button class="btn btn-accent" onclick="checkout()">Checkout</button>
</div>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
