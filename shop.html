<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | FruitStitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container nav-wrapper">
        <a href="index.html" class="brand">
            <svg viewBox="0 0 100 100"><path d="M30 20 L50 5 L70 20 L85 45 L75 85 L50 95 L25 85 L15 45 Z M50 25 L65 45 L55 50 L50 40 L45 50 L35 45 Z M50 60 L60 70 L50 75 L40 70 Z"/></svg>
            FRUITSTITCH
        </a>

        <ul class="nav-menu">
            <li><a href="shop.html" class="nav-link active">Shop</a></li>
            <li><a href="shop.html?gender=men" class="nav-link">Men</a></li>
            <li><a href="shop.html?gender=women" class="nav-link">Women</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
        </ul>

        <div class="nav-actions">
            <button id="theme-toggle-btn" class="icon-btn">🌗</button>
            <a href="signin.html" class="icon-btn">👤</a>
            <a href="dashboard.html" class="icon-btn">♥ <span class="badge wish-count-badge">0</span></a>
            <a href="cart.html" class="icon-btn">🛒 <span class="badge cart-count-badge">0</span></a>
        </div>
    </div>
</header>

<main class="container shop-container">
    <aside class="filters-panel">
        <div class="filter-group">
            <h4>Search</h4>
            <input type="text" id="shop-page-search-input" class="form-control" placeholder="Search products...">
        </div>

        <div class="filter-group">
            <h4>Category</h4>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="hoodies"> Hoodies</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="t-shirts"> T-Shirts</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="cargo pants"> Cargo Pants</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="sneakers"> Sneakers</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="bags"> Bags</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="hats"> Hats</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="denim jackets"> Denim Jackets</label>
            <label class="filter-option"><input type="checkbox" class="filter-category-chk" value="socks"> Socks</label>
        </div>

        <div class="filter-group">
            <h4>Fit</h4>
            <label class="filter-option"><input type="checkbox" class="filter-gender-chk" value="men"> Men</label>
            <label class="filter-option"><input type="checkbox" class="filter-gender-chk" value="women"> Women</label>
        </div>

        <div class="filter-group">
            <h4>Sort</h4>
            <select id="price-sort-select" class="form-control">
                <option value="default">Featured</option>
                <option value="low-high">Price Low to High</option>
                <option value="high-low">Price High to Low</option>
            </select>
        </div>

        <button id="clear-filters-btn" class="btn btn-soft" style="width:100%;">Clear Filters</button>
    </aside>

    <section>
        <div class="shop-topbar">
            <h1>Shop Collection</h1>
            <span id="product-count">0 products found</span>
        </div>

        <div class="products-grid" id="shop-main-products-grid"></div>
    </section>
</main>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
