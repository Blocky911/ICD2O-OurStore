<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | Create Account</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-sidebar">
            <div class="sidebar-logo">STUDIO.</div>
            <p class="sidebar-tagline">Create an account to unlock faster checkouts and track your pieces.</p>
        </div>
        <div class="auth-form-container">
            <a href="index.html" class="back-to-shop">&larr; Back to Shop</a>
            <form class="auth-form" id="signup-form">
                <h2>Create Account</h2>
                <p class="form-subtitle">Join the studio space today.</p>
                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Minimum 6 characters">
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
                <p class="switch-auth">Already have an account? <a href="signin.html">Sign In</a></p>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
