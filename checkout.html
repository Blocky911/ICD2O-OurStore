<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FruitStitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container nav-wrapper">
        <a href="index.html" class="brand">
            <img src="images/fruitstitch-logo.png" alt="FruitStitch Logo" class="site-logo">
            <span class="brand-text">FRUITSTITCH</span>
        </a>

        <a href="cart.html" class="btn">Back to Cart</a>
    </div>
</header>

<main class="container" style="margin-top:3rem;">
    <h1 class="section-title" style="margin-top:1rem;">Checkout</h1>

    <div class="checkout-grid-layout-wrapper">
        <section class="filters-panel" style="position:static;">
            <h2>Delivery Information</h2>

            <form id="checkout-form" style="margin-top:1.5rem;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input id="first-name" class="form-control" type="text" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input id="last-name" class="form-control" type="text" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input class="form-control" type="text" placeholder="123 Main Street" required>
                </div>

                <div style="display:grid; grid-template-columns:2fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>City</label>
                        <input class="form-control" type="text" placeholder="Toronto" required>
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input class="form-control" type="text" placeholder="A1A 1A1" required>
                    </div>
                </div>

                <h2 style="margin:2rem 0 1rem;">Payment</h2>
                <p style="color:var(--text-secondary); margin-bottom:1rem;">Demo checkout only. No real payment is processed.</p>

                <div class="form-group">
                    <label>Card Number</label>
                    <input class="form-control" type="text" placeholder="4000 1234 5678 9010" required>
                </div>

                <button class="btn btn-accent" style="width:100%; margin-top:1rem;">Complete Order</button>
            </form>
        </section>

        <aside class="filters-panel" style="position:static;">
            <h2>Order Summary</h2>

            <div id="checkout-items-summary" style="margin:1.5rem 0;"></div>

            <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
                <input id="promo-input" class="form-control" type="text" placeholder="FRESH20">
                <button id="apply-promo-btn" class="btn">Apply</button>
            </div>

            <p style="display:flex; justify-content:space-between;"><span>Subtotal</span><strong id="co-subtotal">$0.00</strong></p>
            <p style="display:flex; justify-content:space-between;"><span>Discount</span><strong id="co-discount">-$0.00</strong></p>
            <hr style="border-color:var(--border-color); margin:1rem 0;">
            <h2 style="display:flex; justify-content:space-between;"><span>Total</span><span id="co-total">$0.00</span></h2>
        </aside>
    </div>
</main>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
