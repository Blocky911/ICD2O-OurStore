<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | Designer Wear</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">STUDIO.</div>
        <nav>
            <ul>
                <li><a href="index.html">Shop</a></li>
                <li><a href="#">Collections</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
        <div class="nav-utilities">
            <button class="theme-toggle-btn" id="theme-toggle">🌓 Mode</button>
            <a href="signin.html" class="signin-link" id="user-nav-link">Sign In</a>
            <div class="cart-icon" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>New Arrivals</h1>
            <p>Elevate your everyday with our latest designer wear.</p>
        </section>
        <section class="product-grid" id="product-grid"></section>
    </main>

    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart-btn" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <p class="empty-msg">Your cart is empty.</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">Total: $<span id="cart-total-val">0.00</span></div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout simulation!')">Checkout</button>
        </div>
    </div>
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <footer>
        <p>&copy; 2026 STUDIO Designer Wear. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
