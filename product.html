<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specs View // NovaStitch Technical Garments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container nav-wrapper">
            <a href="index.html" class="brand">
                <svg viewBox="0 0 100 100"><path d="M30 20 L50 5 L70 20 L85 45 L75 85 L50 95 L25 85 L15 45 Z M50 25 L65 45 L55 50 L50 40 L45 50 L35 45 Z M50 60 L60 70 L50 75 L40 70 Z"/></svg>
                NOVASTITCH
            </a>
            <div class="nav-actions">
                <a href="shop.html" class="btn" style="padding:0.4rem 1rem;">Back To Base Catalog</a>
                <a href="checkout.html" class="icon-btn">🛒 <span class="badge cart-count-badge">0</span></a>
            </div>
        </div>
    </header>

    <main class="container detail-grid" id="product-detail-container">
        <div class="detail-gallery" id="dp-graphic-target">
            </div>

        <div class="product-details-content-panel">
            <span id="dp-category" style="text-transform:uppercase; color:var(--accent); font-weight:700; letter-spacing:2px;">CATEGORY // GENDER</span>
            <h1 id="dp-title" style="font-family:var(--font-display); font-size:2.5rem; margin:0.5rem 0 1.5rem 0; line-height:1.1;">SYSTEM SPEC TITLE</h1>
            <div id="dp-price" style="font-size:2rem; font-weight:700; margin-bottom:1.5rem;">$0.00</div>
            
            <p id="dp-description" style="color:var(--text-muted); margin-bottom:2rem; font-size:1.05rem;">Design description information loader state initializing...</p>
            
            <div id="dp-stock" style="font-weight:700; font-size:0.85rem; letter-spacing:1px; margin-bottom:1.5rem;">STOCK MONITOR TRACKER</div>

            <div>
                <span style="font-size:0.8rem; text-transform:uppercase; color:var(--text-muted);">Calibrate Fit Profile</span>
                <div class="size-selector">
                    <div class="size-box" data-size="S">S</div>
                    <div class="size-box selected" data-size="M">M</div>
                    <div class="size-box" data-size="L">L</div>
                    <div class="size-box" data-size="XL">XL</div>
                </div>
            </div>

            <div style="display:flex; gap:1rem; margin-top:2.5rem; align-items:center;">
                <div>
                    <label for="dp-qty-select" style="font-size:0.75rem; text-transform:uppercase; display:block; margin-bottom:0.3rem;">Units</label>
                    <select id="dp-qty-select" class="form-control" style="width:80px; padding:0.65rem;">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <button id="dp-add-btn" class="btn btn-accent" style="flex:1; margin-top:1.2rem;">Commit to loadout cart</button>
            </div>

            <div style="margin-top:3rem; border-top:1px solid var(--border-color); padding-top:2rem;">
                <h4 style="text-transform:uppercase; margin-bottom:1rem; font-size:0.9rem;">CONSTRUCTION ARCHITECTURE CHECKLIST</h4>
                <ul id="dp-features-list" style="margin-left:1.25rem; color:var(--text-muted); display:flex; flex-direction:column; gap:0.5rem;">
                    </ul>
            </div>
        </div>
    </main>

    <script src="products.js"></script>
    <script src="app.js"></script>
</body>
</html>
