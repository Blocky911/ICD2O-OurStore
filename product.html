<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | FruitStitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container nav-wrapper">
        <a href="index.html" class="brand">
            <img src="images/fruitstitch-logo.png" alt="FruitStitch Logo" class="site-logo">
            <span class="brand-text">FRUITSTITCH</span>
        </a>

        <div class="nav-actions">
            <a href="shop.html" class="btn">Back to Shop</a>
            <a href="cart.html" class="icon-btn">🛒 <span class="badge cart-count-badge">0</span></a>
        </div>
    </div>
</header>

<main class="container detail-grid" id="product-detail-container">
    <div class="detail-gallery" id="dp-graphic-target"></div>

    <section class="product-details-content-panel">
        <span id="dp-category"></span>
        <h1 id="dp-title" style="font-size:2.6rem; margin:0.8rem 0;"></h1>
        <div id="dp-price" style="font-size:2rem; font-weight:900; color:var(--accent-success); margin-bottom:1rem;"></div>

        <p id="dp-description" style="color:var(--text-secondary); margin-bottom:1.5rem;"></p>
        <div id="dp-stock" style="font-weight:900; margin-bottom:1.5rem;"></div>

        <h4>Choose Size</h4>
        <div class="size-selector">
            <div class="size-box" data-size="S">S</div>
            <div class="size-box selected" data-size="M">M</div>
            <div class="size-box" data-size="L">L</div>
            <div class="size-box" data-size="XL">XL</div>
        </div>

        <div style="display:flex; gap:1rem; margin-top:2rem;">
            <select id="dp-qty-select" class="form-control" style="max-width:90px;">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>

            <button id="dp-add-btn" class="btn btn-accent" style="flex:1;">Add to Cart</button>
        </div>

        <div style="margin-top:2.5rem;">
            <h4>Product Features</h4>
            <ul id="dp-features-list" style="margin-left:1.2rem; color:var(--text-secondary); margin-top:1rem;"></ul>
        </div>
    </section>
</main>

<section class="container">
    <h2 class="section-title">You May Also Like</h2>
    <div class="products-grid" id="recommended-products-grid"></div>
</section>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
