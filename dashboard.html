<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FruitStitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container nav-wrapper">
        <a href="index.html" class="brand">
            <img src="images/fruitstitch-logo.png" alt="FruitStitch Logo" class="site-logo">
            <span class="brand-text">FRUITSTITCH</span>
        </a>

        <div class="nav-actions">
            <a href="shop.html" class="btn">Shop</a>
            <button id="logout-trigger" class="btn btn-soft">Logout</button>
        </div>
    </div>
</header>

<main class="container">
    <section class="dashboard-hero">
        <div class="avatar-circle">⚡</div>
        <div>
            <h1 id="db-username">User</h1>
            <p id="db-tier">FruitStitch VIP Member</p>
            <p id="db-email">email@example.com</p>
        </div>
    </section>

    <h2 class="section-title">Wishlist</h2>
    <div class="products-grid" id="db-wishlist-grid"></div>
</main>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
