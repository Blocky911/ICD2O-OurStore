<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | Sign In</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-sidebar">
            <div class="sidebar-logo">STUDIO.</div>
            <p class="sidebar-tagline">Access exclusive drops, tracking, and member-only designer wear.</p>
        </div>
        <div class="auth-form-container">
            <a href="index.html" class="back-to-shop">&larr; Back to Shop</a>
            
            <form class="auth-form" id="signin-form">
                <h2>Sign In</h2>
                <p class="form-subtitle">Enter details to access your account.</p>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="auth-btn">Sign In</button>

                <div class="social-auth-container" style="margin-top: 1rem;">
                    <button type="button" class="auth-btn google-btn" id="google-signin-btn" style="background: #ffffff; color: #000000; border: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%;">
                        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google Logo" style="width: 18px; height: 18px;">
                        Continue with Google
                    </button>
                </div>
                
                <p class="switch-auth">Don't have an account? <a href="signup.html">Create one</a></p>
            </form>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
