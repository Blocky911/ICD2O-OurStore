<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | Sign In</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-sidebar">
            <div class="sidebar-logo">STUDIO.</div>
            <p class="sidebar-tagline">Access exclusive drops, tracking, and member-only designer wear.</p>
        </div>
        <div class="auth-form-container">
            <a href="index.html" class="back-to-shop">&larr; Back to Shop</a>
            <form class="auth-form" id="signin-form">
                <h2>Sign In</h2>
                <p class="form-subtitle">Enter details to access your account.</p>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
                <p class="switch-auth">Don't have an account? <a href="signup.html">Create one</a></p>
            </form>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
